version: "3.8"

services:
  rag-proxy:
    build: .
    container_name: rag-proxy
    restart: unless-stopped
    ports:
      - "11435:11435"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - OLLAMA_INTERNAL_URL=http://host.docker.internal:11434
    volumes:
      - chroma_data:/root/chroma_db
      - /root/drogonmd_files:/app/documentation
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  chroma_data:
